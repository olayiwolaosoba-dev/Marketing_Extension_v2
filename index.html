<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FF6B3D" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@100..900&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Albert Sans', sans-serif;
      background-color: #FFFFFF;
      color: #0B0D17;
      overflow-x: hidden;
    }

    .font-display {
      font-family: 'Bricolage Grotesque', sans-serif;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes scramble {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-scramble {
      animation: scramble 0.5s ease-out forwards;
    }

    .clipped-bottom {
      clip-path: ellipse(150% 100% at 50% 0%);
    }

    .clipped-top {
      clip-path: ellipse(150% 100% at 50% 100%);
    }

    /* Benchmark Reveal Animation */
    .reveal-text {
      overflow: hidden;
    }

    .reveal-text span {
      display: block;
      transform: translateY(100%);
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .reveal-text.visible span {
      transform: translateY(0);
    }
  </style>


</head>

<body>
  <div id="root"></div>
  <script>
    // v2: Force nuke stale service workers and caches
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(n) { caches.delete(n); });
        });
      }
    }
  </script>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
